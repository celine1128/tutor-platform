<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: header('注册')"></head>
<body>
<div class="container mt-5" style="max-width: 500px;">
    <div class="card shadow">
        <div class="card-header bg-success text-white">用户注册</div>
        <div class="card-body">
            <form method="post" th:action="@{/register}">
                <div class="mb-3">
                    <label>手机号</label>
                    <input type="text" name="phone" class="form-control" required pattern="1[3-9]\d{9}">
                </div>
                <div class="mb-3">
                    <label>密码</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>昵称</label>
                    <input type="text" name="nickname" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>角色</label>
                    <select name="role" class="form-select">
                        <option value="parent">家长</option>
                        <option value="teacher">老师</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-success w-100">注册</button>
                <p class="mt-3 text-center"><a th:href="@{/login}">已有账号？去登录</a></p>
            </form>
            <div th:if="${error}" class="alert alert-danger mt-3" th:text="${error}"></div>
        </div>
    </div>
</div>
<th:block th:replace="fragments/footer"></th:block>
