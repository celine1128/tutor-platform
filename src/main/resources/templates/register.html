<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head('用户注册')"></head>
<body>
<div th:replace="fragments/header :: navbar"></div>

<div class="container mt-5" style="max-width: 500px;">
    <div class="card shadow border-0">
        <div class="card-header bg-success text-white text-center py-3">
            <h4 class="mb-0">加入平台</h4>
        </div>
        <div class="card-body p-4">
            <form method="post" th:action="@{/register}">
                <div class="mb-3">
                    <label class="form-label">手机号</label>
                    <input type="text" name="phone" class="form-control" placeholder="11位手机号" required pattern="1[3-9]\d{9}">
                </div>
                <div class="mb-3">
                    <label class="form-label">设置密码</label>
                    <input type="password" name="password" class="form-control" placeholder="请输入密码" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">您的昵称</label>
                    <input type="text" name="nickname" class="form-control" placeholder="怎么称呼您？" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">身份选择</label>
                    <select name="role" class="form-select form-select-lg">
                        <option value="parent">我是家长（找教员）</option>
                        <option value="teacher">我是老师（找兼职）</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-success btn-lg w-100 shadow-sm">立即注册</button>
                <div class="mt-3 text-center">
                    <a th:href="@{/login}" class="text-decoration-none text-muted small">已有账号？返回登录</a>
                </div>
            </form>
            <div th:if="${error}" class="alert alert-danger mt-3 mb-0" th:text="${error}"></div>
        </div>
    </div>
</div>

<th:block th:replace="fragments/footer"></th:block>
</body>
</html>
