<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>订单列表</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h3>我的订单</h3>
    <table class="table table-bordered mt-3">
        <tr>
            <th>需求ID</th>
            <th>状态</th>
            <th>创建时间</th>
            <th>操作</th>
        </tr>
        <tr th:each="o : ${orderList}">
            <td th:text="${o.demandId}"></td>
            <td th:text="${o.status==0 ? '待确认' : '已完成'}"></td>
            <td th:text="${#dates.format(o.createTime, 'yyyy-MM-dd HH:mm')}"></td>
            <td>
                <a th:if="${o.status==0}"
                   th:href="@{/order/complete/{id}(id=${o.id})}"
                   class="btn btn-sm btn-success">确认完成</a>
            </td>
        </tr>
    </table>
</div>
</body>
</html>
