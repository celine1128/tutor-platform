<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head('用户登录')"></head>
<body>
<div th:replace="fragments/header :: navbar"></div>

<div class="container mt-5" style="max-width: 500px;">
    <div class="card shadow border-0">
        <div class="card-header bg-primary text-white text-center py-3">
            <h4 class="mb-0">用户登录</h4>
        </div>
        <div class="card-body p-4">
            <form method="post" th:action="@{/login}">
                <div class="mb-3">
                    <label class="form-label">手机号</label>
                    <input type="text" name="phone" class="form-control form-control-lg" placeholder="请输入手机号" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">密码</label>
                    <input type="password" name="password" class="form-control form-control-lg" placeholder="请输入密码" required>
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100 shadow-sm">立即登录</button>
                <div class="mt-4 text-center">
                    <span class="text-muted">没有账号？</span>
                    <a th:href="@{/register}" class="text-decoration-none">立即注册</a>
                </div>
            </form>
            <div th:if="${error}" class="alert alert-danger mt-3 mb-0" th:text="${error}"></div>
        </div>
    </div>
</div>

<th:block th:replace="fragments/footer"></th:block>
</body>
</html>
