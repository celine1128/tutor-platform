<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: header('我的订单')"></head>
<body>
<th:block th:replace="fragments/header :: header"></th:block>
<h2>我的订单</h2>
<table class="table table-bordered">
    <thead class="table-dark">
        <tr>
            <th>需求科目</th>
            <th>年级</th>
            <th>价格</th>
            <th th:if="${currentRole == 'parent'}">接单老师</th>
            <th th:if="${currentRole == 'teacher'}">家长</th>
            <th>订单状态</th>
            <th>创建时间</th>
            <th>操作</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="order : ${orders}">
            <td th:text="${demandMap[order.id].subject}"></td>
            <td th:text="${demandMap[order.id].grade}"></td>
            <td th:text="${demandMap[order.id].price}"></td>
            <td th:if="${currentRole == 'parent'}" th:text="${userNicknameMap[order.teacherId]}"></td>
            <td th:if="${currentRole == 'teacher'}" th:text="${userNicknameMap[order.parentId]}"></td>
            <td>
                <span th:if="${order.status == 0}" class="badge bg-secondary">待确认</span>
                <span th:if="${order.status == 1}" class="badge bg-info">已完成</span>
            </td>
            <td th:text="${#temporals.format(order.createTime, 'yyyy-MM-dd HH:mm')}"></td>
            <td>
                <form th:if="${currentRole == 'parent' and order.status == 0}" method="post" th:action="@{/order/complete}">
                    <input type="hidden" name="orderId" th:value="${order.id}">
                    <button type="submit" class="btn btn-sm btn-primary">确认完成</button>
                </form>
                <span th:if="${currentRole == 'parent' and order.status == 1}" class="text-muted">已完成</span>
                <span th:if="${currentRole == 'teacher' and order.status == 0}" class="text-muted">等待家长确认</span>
                <span th:if="${currentRole == 'teacher' and order.status == 1}" class="text-muted">已完成</span>
            </td>
        </tr>
    </tbody>
</table>
<th:block th:replace="fragments/footer"></th:block>
